version: 2
project_name: miranda

before:
  hooks:
    # Use `go mod download`, NOT `go mod tidy`: tidy MUTATES go.mod/go.sum, so at
    # release time it would build the artifacts from a tree that differs from the
    # tagged commit. download only populates the module cache, leaving the tree
    # byte-identical to the tag.
    - sh -c "cd go && go mod download"

builds:
  - id: mir
    main: ./cmd/mir
    binary: mir
    dir: go
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/srcful/terminal-relay/go/internal/version.Version={{ .Version }}
      - -X github.com/srcful/terminal-relay/go/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/srcful/terminal-relay/go/internal/version.Date={{ .Date }}
  - id: mir-agent
    main: ./cmd/mir-agent
    binary: mir-agent
    dir: go
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/srcful/terminal-relay/go/internal/version.Version={{ .Version }}
      - -X github.com/srcful/terminal-relay/go/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/srcful/terminal-relay/go/internal/version.Date={{ .Date }}
  - id: mir-signal
    main: ./cmd/mir-signal
    binary: mir-signal
    dir: go
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/srcful/terminal-relay/go/internal/version.Version={{ .Version }}
      - -X github.com/srcful/terminal-relay/go/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/srcful/terminal-relay/go/internal/version.Date={{ .Date }}

archives:
  # One archive entry PER build id. A single entry covering multiple builds would
  # bundle all binaries into one archive per platform and make {{ .Binary }}
  # ambiguous — the installer/self-update need one archive per binary.
  - id: mir
    ids: [mir]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: [] # binary only; no README/LICENSE noise inside the archive
  - id: mir-agent
    ids: [mir-agent]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: []
  - id: mir-signal
    ids: [mir-signal]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: []

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Cosign keyless signing of checksums.txt (Sigstore / Fulcio / Rekor).
#
# Trust chain: checksums.txt pins the SHA256 of every release archive, and the
# installer / `mir self-update` verify each downloaded archive against it. That
# digest is only trustworthy if checksums.txt itself is authentic — otherwise an
# attacker who can publish a release could swap both an archive AND its checksum.
# This block closes that gap by signing checksums.txt with cosign.
#
# "Keyless" means there is NO long-lived signing key to store or leak: cosign
# requests a short-lived (~10 min) certificate from Fulcio, bound to the CI job's
# GitHub Actions OIDC identity (the release workflow's SAN), and records the
# signature in the Rekor transparency log. Verification (see install.sh and
# selfupdate/verify.go) pins that SAN, so a valid signature proves checksums.txt
# was produced by THIS repo's release workflow on a tag push — not by anyone else
# with write access to the releases page.
#
# Produces checksums.txt.sig (signature) and checksums.txt.pem (the Fulcio
# signing cert) as release assets. Requires `id-token: write` in the workflow
# (OIDC) and cosign on PATH — both wired up in .github/workflows/release.yml.
signs:
  - cmd: cosign
    artifacts: checksum # sign checksums.txt only; its digest already covers every binary
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    # ${artifact}/${signature}/${certificate} are expanded by GoReleaser per file.
    # --yes skips cosign's interactive confirmation (no TTY in CI).
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    output: true # echo cosign's stdout/stderr into the release log

release:
  github:
    owner: srcfl
    name: miranda
  draft: false
  prerelease: auto

changelog:
  use: github
