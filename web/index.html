<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Miranda</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0b0e14" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Miranda" />

<!-- import map -> locally-vendored deps (NEVER load security-critical crypto from a CDN at runtime) -->
<script type="importmap" nonce="__CSP_NONCE__">
{
  "imports": {
    "@noble/curves/ed25519": "/vendor/noble-curves-ed25519.js",
    "@noble/ciphers/chacha": "/vendor/noble-ciphers-chacha.js",
    "@noble/hashes/sha2": "/vendor/noble-hashes-sha2.js",
    "@noble/hashes/hmac": "/vendor/noble-hashes-hmac.js",
    "@noble/hashes/hkdf": "/vendor/noble-hashes-hkdf.js",
    "@noble/hashes/utils": "/vendor/noble-hashes-utils.js",

</script>
<style>
  :root { --bg:#0b0e14; --fg:#cbd5e1; --mut:#64748b; --acc:#4ade80; --card:#11161f; --line:#1e293b; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; }
  #app { height: 100vh; }
  .view { max-width: 760px; margin: 0 auto; padding: calc(env(safe-area-inset-top) + 40px) 20px 40px; }
  .view.term { max-width: none; padding: 0; height: 100vh; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; gap: 6px; background: #0d121b; border-bottom: 1px solid var(--line);
    padding: calc(env(safe-area-inset-top) + 8px) 10px 8px; }
  .tb-btn { background: none; border: 0; color: var(--fg); font: inherit; font-size: 15px; cursor: pointer; padding: 8px; min-width: 44px; }
  .tb-title { flex: 1; text-align: center; font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .winbar { display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #0b0e14; border-bottom: 1px solid var(--line); }
  .winbar-label { color: var(--mut); font-size: 12px; margin-right: 6px; }
  .winbar .tb-btn { font-size: 14px; padding: 6px 12px; min-width: 0; }
  .pills { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; flex: 1; }
  .pill { flex: 0 0 auto; scroll-snap-align: center; background: #11161f; border: 1px solid var(--line); color: var(--fg);
    border-radius: 8px; padding: 6px 12px; font: 13px ui-sans-serif, system-ui; cursor: pointer; min-height: 36px;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .pill.active { border-color: var(--acc); color: var(--acc); }
  .pill.add { color: var(--acc); border-style: dashed; }
  .pill.sess { background: #0b0e14; border-style: dashed; color: var(--mut); }
  .pill.status { font-variant-numeric: tabular-nums; }
  .pill.status.ok { opacity: .75; }
  .pill.status.wait { opacity: .85; animation: mir-pulse 1.2s ease-in-out infinite; }
  .pill.status.failed { color: #ff6b6b; border-color: #ff6b6b; }
  @keyframes mir-pulse { 0%, 100% { opacity: .4; } 50% { opacity: .9; } }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot.act { background: #38bdf8; } .dot.bell { background: #f87171; }
  .wgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 12px; }
  .wcard { text-align: left; background: #11161f; border: 1px solid var(--line); border-radius: 12px; padding: 12px; color: var(--fg); font: inherit; cursor: pointer; }
  .wcard.active { border-color: var(--acc); }
  .wcard-name { font-weight: 600; }
  .wcard-sub { color: var(--mut); font-size: 12px; margin: 4px 0 8px; font-family: ui-monospace, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wcard-actions { display: flex; gap: 14px; }
  .wcard-actions .link { margin: 0; font-size: 13px; }
  .sheet { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: flex-end; justify-content: center; z-index: 20; }
  .sheet-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px 16px 0 0; width: 100%; max-width: 520px;
    padding: 16px 16px calc(env(safe-area-inset-bottom) + 16px); }
  .sheet-title { font-weight: 650; margin: 0 0 10px; }
  .sheet-subtitle { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; font-weight: 600; margin: 6px 0 8px; }
  .sheet-subtitle .sub-acts { display: flex; gap: 14px; font-weight: 400; }
  .sheet-subtitle .link { margin: 0; font-size: 13px; }
  .sheet-item { display: block; width: 100%; text-align: left; background: #11161f; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; margin-bottom: 8px; color: var(--fg); font: inherit; cursor: pointer; }
  .sheet-item.add { border-style: dashed; color: var(--acc); }
  .sheet-item.active { border-color: var(--acc); color: var(--acc); }
  h1 { font-size: 22px; font-weight: 650; margin: 0 0 4px; }
  .muted { color: var(--mut); margin: 0 0 20px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px;
    color: var(--fg); text-align: left; cursor: pointer; transition: border-color .15s, transform .05s; font: inherit; }
  .card:hover { border-color: var(--acc); }
  .card:active { transform: scale(.98); }
  .card .name { font-weight: 600; font-size: 16px; }
  .card .sub { color: var(--mut); font-size: 12px; margin-top: 4px; font-family: ui-monospace, monospace; }
  .card.add { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border-style: dashed; }
  .card.add .plus { font-size: 24px; color: var(--acc); }
  .code { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: #0d121b; color: var(--fg); font: 13px ui-monospace, monospace; margin-bottom: 12px; }
  .btn { background: var(--acc); color: #052e16; border: 0; border-radius: 10px; padding: 10px 18px;
    font: inherit; font-weight: 650; cursor: pointer; }
  .link { background: none; border: 0; color: var(--mut); cursor: pointer; font: inherit; padding: 8px 0; display: inline-block; margin-top: 16px; }
  .link.back { align-self: flex-start; margin: 0 0 6px; }
  .status { margin-top: 16px; font-size: 14px; }
  .ok { color: var(--acc); font-weight: 600; }
  .sas { font-family: ui-monospace, monospace; font-size: 18px; margin: 8px 0; letter-spacing: 1px; }
  .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
  .actions .link { margin-top: 0; }
  .termbox { flex: 1; min-height: 0; overflow: hidden; padding: 6px 10px calc(env(safe-area-inset-bottom) + 20px); }
  /* Mobile key bar: a horizontal row of thumb-sized buttons that sits just above
     the soft keyboard. Only rendered on coarse-pointer (touch) devices — desktop
     never sees it. The safe-area inset lives here (not on .termbox) when present
     so the bar clears the home indicator. flex-shrink:0 keeps it full height. */
  .keybar { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    flex: 0 0 auto; padding: 6px 8px calc(env(safe-area-inset-bottom) + 6px);
    background: #0d121b; border-top: 1px solid var(--line); scrollbar-width: none; }
  .keybar::-webkit-scrollbar { display: none; }
  .keybar-btn { flex: 0 0 auto; min-width: 44px; min-height: 44px; padding: 0 14px;
    background: #11161f; border: 1px solid var(--line); border-radius: 10px; color: var(--fg);
    font: 16px/1 ui-monospace, monospace; cursor: pointer; touch-action: manipulation;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  .keybar-btn:active { background: #1b2433; }
  /* Ctrl armed (sticky modifier): highlight so it's obvious the next key is a control code. */
  .keybar-ctrl.armed { background: var(--acc); color: #052e16; border-color: var(--acc); font-weight: 700; }
  .scanner { width: 100%; max-height: 60vh; border-radius: 14px; background: #000; object-fit: cover; margin-bottom: 8px; }
</style>
</head>

<div id="app"></div>
